<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Friends</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: var(--tg-theme-bg-color, #f5f5f5); color: var(--tg-theme-text-color, #222); }
        .btn { background: var(--tg-theme-button-color, #2481cc); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; margin: 5px; width: 100%; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; }
        .question { background: var(--tg-theme-secondary-bg-color, #fff); padding: 15px; margin: 10px 0; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🎮 Quest Friends</h1>
    <div id="user"></div>
    
    <div id="feed">
        <div id="questions"></div>
        <button class="btn" id="newBtn">✨ Новый вопрос</button>
    </div>

    <div id="create" style="display:none;">
        <textarea id="qText" placeholder="Ваш вопрос" rows="2"></textarea>
        <input id="opt0" placeholder="Вариант А">
        <input id="opt1" placeholder="Вариант Б">
        <input id="opt2" placeholder="Вариант В">
        <input id="opt3" placeholder="Вариант Г">
        <select id="correct">
            <option value="0">А</option>
            <option value="1">Б</option>
            <option value="2">В</option>
            <option value="3">Г</option>
        </select>
        <button class="btn" id="publishBtn">📢 Опубликовать</button>
        <button class="btn" id="backBtn">← Назад</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let user = tg.initDataUnsafe?.user;
        let allQuestions = JSON.parse(localStorage.getItem('questions') || '[]');

        document.getElementById('user').innerText = user ? `👤 ${user.first_name}` : '';

        function showFeed() {
            document.getElementById('create').style.display = 'none';
            document.getElementById('feed').style.display = 'block';
            render();
        }

        function render() {
            let html = '';
            
            // ПОКАЗЫВАЕМ ВСЕ ВОПРОСЫ, КРОМЕ СВОИХ
            let otherQuestions = allQuestions.filter(q => q.author !== user?.first_name);
            
            if (otherQuestions.length === 0) {
                html = '<p>😢 Пока нет вопросов от других пользователей</p>';
            } else {
                otherQuestions.forEach(q => {
                    html += '<div class="question">';
                    html += `<b>👤 ${q.author}</b><br>`;
                    html += `${q.text}<br>`;
                    q.options.forEach((opt, i) => {
                        html += `<button class="btn" onclick="answer('${q.id}', ${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
                    });
                    html += `<br><small>👥 ${q.answers || 0} ответов</small>`;
                    html += '</div>';
                });
            }
            
            document.getElementById('questions').innerHTML = html;
        }

        window.answer = function(id, opt) {
            let q = allQuestions.find(x => x.id === id);
            if (!q) return;
            if (opt === q.correct) {
                tg.showAlert('✅ Правильно!');
                q.answers = (q.answers || 0) + 1;
                localStorage.setItem('questions', JSON.stringify(allQuestions));
                render();
            } else {
                tg.showAlert('❌ Не совпало');
            }
        };

        document.getElementById('newBtn').onclick = () => {
            document.getElementById('feed').style.display = 'none';
            document.getElementById('create').style.display = 'block';
        };

        document.getElementById('backBtn').onclick = showFeed;

        document.getElementById('publishBtn').onclick = () => {
            let text = document.getElementById('qText').value.trim();
            let opts = [
                document.getElementById('opt0').value.trim(),
                document.getElementById('opt1').value.trim(),
                document.getElementById('opt2').value.trim(),
                document.getElementById('opt3').value.trim()
            ];
            let correct = document.getElementById('correct').value;

            if (!text || opts.some(o => !o)) {
                tg.showAlert('Заполните всё');
                return;
            }

            allQuestions.push({
                id: Date.now() + '',
                author: user.first_name,
                text: text,
                options: opts,
                correct: parseInt(correct),
                answers: 0
            });

            localStorage.setItem('questions', JSON.stringify(allQuestions));
            tg.showAlert('✅ Вопрос опубликован!');
            
            document.getElementById('qText').value = '';
            opts.forEach((_, i) => document.getElementById(`opt${i}`).value = '');
            showFeed();
        };

        render();
        showFeed();
    </script>
</body>
</html>
